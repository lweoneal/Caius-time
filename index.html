<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="60">
  <title>Caius Time Reference</title>
  <style>
    body {
      font-family: monospace;
      font-size: 24px;
      padding: 40px;
      background: #f5f4f0;
      color: #1a1a18;
    }
  </style>
</head>
<body>
  <div id="time"></div>
  <script>
    function updateTime() {
      const now = new Date();
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        timeZoneName: 'short',
        timeZone: 'America/Chicago'
      };
      document.getElementById('time').innerText =
        'Current date and time: ' + now.toLocaleString('en-US', options);
    }
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
